<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test HC Report - Hexi-Flexi Grid (30 instances)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --transition-speed: 0.3s;
    }

    [data-theme="dark"] {
      --bg-body: #0b0f19;
      --bg-surface: #111827;
      --bg-card: #1a2236;
      --bg-card-alt: #151d2e;
      --bg-hover: #1f2b42;
      --text-primary: #e8edf5;
      --text-secondary: #8896b0;
      --text-muted: #5a6a85;
      --border: rgba(136, 150, 176, 0.12);
      --border-hover: rgba(136, 150, 176, 0.22);
      --accent: #6366f1;
      --accent-soft: rgba(99, 102, 241, 0.12);
      --critical: #f43f5e;
      --critical-bg: rgba(244, 63, 94, 0.1);
      --critical-border: rgba(244, 63, 94, 0.2);
      --warning: #f59e0b;
      --warning-bg: rgba(245, 158, 11, 0.1);
      --warning-border: rgba(245, 158, 11, 0.2);
      --safe: #10b981;
      --safe-bg: rgba(16, 185, 129, 0.1);
      --safe-border: rgba(16, 185, 129, 0.2);
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.25);
      --chart-grid: rgba(136, 150, 176, 0.06);
      --toggle-bg: #1a2236;
      --toggle-knob: #e8edf5;
    }

    [data-theme="light"] {
      --bg-body: #f5f7fa;
      --bg-surface: #ffffff;
      --bg-card: #ffffff;
      --bg-card-alt: #f8fafc;
      --bg-hover: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border: rgba(15, 23, 42, 0.08);
      --border-hover: rgba(15, 23, 42, 0.15);
      --accent: #6366f1;
      --accent-soft: rgba(99, 102, 241, 0.08);
      --critical: #e11d48;
      --critical-bg: rgba(225, 29, 72, 0.06);
      --critical-border: rgba(225, 29, 72, 0.15);
      --warning: #d97706;
      --warning-bg: rgba(217, 119, 6, 0.06);
      --warning-border: rgba(217, 119, 6, 0.15);
      --safe: #059669;
      --safe-bg: rgba(5, 150, 105, 0.06);
      --safe-border: rgba(5, 150, 105, 0.15);
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.06);
      --chart-grid: rgba(15, 23, 42, 0.05);
      --toggle-bg: #e2e8f0;
      --toggle-knob: #0f172a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    .header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 24px 0;
    }

    .header-inner {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header-left .meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-track {
      width: 44px;
      height: 24px;
      border-radius: 12px;
      background: var(--toggle-bg);
      border: 1px solid var(--border);
      position: relative;
    }

    .toggle-knob {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--toggle-knob);
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform var(--transition-speed);
    }

    [data-theme="light"] .toggle-knob {
      transform: translateX(20px);
    }

    .container {
      max-width: 1320px;
      margin: 0 auto;
      padding: 28px;
    }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      box-shadow: var(--shadow);
    }

    .stat-card:hover {
      box-shadow: var(--shadow-lg);
      border-color: var(--border-hover);
    }

    .stat-card .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .stat-card .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .stat-card.total .stat-value {
      color: var(--accent);
    }

    .stat-card.critical .stat-value {
      color: var(--critical);
    }

    .stat-card.warning .stat-value {
      color: var(--warning);
    }

    .stat-card.safe .stat-value {
      color: var(--safe);
    }

    .stat-card .stat-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .group {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .group:hover {
      border-color: var(--border-hover);
    }

    .group-head {
      padding: 16px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      gap: 16px;
    }

    .group-head:hover {
      background: var(--bg-hover);
    }

    .group-head-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      min-width: 0;
    }

    .group-host-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      color: var(--accent);
      font-weight: 700;
    }

    .group-host-name {
      font-size: 0.92rem;
      font-weight: 600;
    }

    .group-host-count {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .group-badges {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .badge.critical {
      background: var(--critical-bg);
      color: var(--critical);
      border: 1px solid var(--critical-border);
    }

    .badge.critical .badge-dot {
      background: var(--critical);
    }

    .badge.warning {
      background: var(--warning-bg);
      color: var(--warning);
      border: 1px solid var(--warning-border);
    }

    .badge.warning .badge-dot {
      background: var(--warning);
    }

    .badge.safe {
      background: var(--safe-bg);
      color: var(--safe);
      border: 1px solid var(--safe-border);
    }

    .badge.safe .badge-dot {
      background: var(--safe);
    }

    .group-chevron {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .group-chevron svg {
      width: 14px;
      height: 14px;
      fill: var(--text-muted);
      transition: transform 0.25s ease;
    }

    .group.open .group-chevron svg {
      transform: rotate(180deg);
      fill: var(--accent);
    }

    .group-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .group.open .group-body {
      max-height: 3000px;
    }

    .group-body-inner {
      padding: 0 22px 22px;
    }

    .overview-row {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .chart-panel {
      background: var(--bg-card-alt);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }

    .chart-panel .panel-title,
    .alerts-panel .panel-title {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .chart-box {
      height: 160px;
    }

    .alerts-panel {
      background: var(--bg-card-alt);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      overflow: auto;
    }

    .alert-list {
      list-style: none;
    }

    .alert-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 0.8rem;
    }

    .alert-item:hover {
      background: var(--bg-hover);
    }

    .alert-item .alert-icon {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      margin-top: 1px;
    }

    .alert-item.critical-item .alert-icon {
      background: var(--critical-bg);
      color: var(--critical);
      border: 1px solid var(--critical-border);
    }

    .alert-item.warning-item .alert-icon {
      background: var(--warning-bg);
      color: var(--warning);
      border: 1px solid var(--warning-border);
    }

    .alert-item .alert-body {
      flex: 1;
      min-width: 0;
    }

    .alert-item .alert-title {
      font-weight: 600;
      font-size: 0.8rem;
    }

    .alert-item .alert-detail {
      color: var(--text-secondary);
      font-size: 0.72rem;
      margin-top: 1px;
    }

    .alert-item .alert-badge {
      flex-shrink: 0;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    .alert-item.critical-item .alert-badge {
      background: var(--critical-bg);
      color: var(--critical);
      border: 1px solid var(--critical-border);
    }

    .alert-item.warning-item .alert-badge {
      background: var(--warning-bg);
      color: var(--warning);
      border: 1px solid var(--warning-border);
    }

    .no-alerts {
      color: var(--text-muted);
      font-size: 0.78rem;
      font-style: italic;
      text-align: center;
      padding: 20px 0;
    }

    .tbl {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      font-size: 0.8rem;
    }

    .tbl thead th {
      background: var(--bg-card-alt);
      color: var(--text-muted);
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 10px 12px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .tbl tbody td {
      padding: 10px 12px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      vertical-align: middle;
    }

    .tbl tbody tr:hover td {
      background: var(--bg-hover);
    }

    .tbl tbody tr:last-child td {
      border-bottom: none;
    }

    .p {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .p-ok,
    .p-safe {
      background: var(--safe-bg);
      color: var(--safe);
      border: 1px solid var(--safe-border);
    }

    .p-warn {
      background: var(--warning-bg);
      color: var(--warning);
      border: 1px solid var(--warning-border);
    }

    .p-alert {
      background: var(--critical-bg);
      color: var(--critical);
      border: 1px solid var(--critical-border);
    }

    .p-na {
      background: var(--bg-card-alt);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .p-sync {
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .p-replica {
      background: var(--safe-bg);
      color: var(--safe);
      border: 1px solid var(--safe-border);
    }

    .p-unsync {
      background: var(--critical-bg);
      color: var(--critical);
      border: 1px solid var(--critical-border);
    }

    .footer {
      text-align: center;
      padding: 24px 28px;
      color: var(--text-muted);
      font-size: 0.72rem;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }

    @media(max-width:1000px) {
      .overview-row {
        grid-template-columns: 1fr;
      }

      .summary-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media(max-width:600px) {
      .summary-row {
        grid-template-columns: 1fr;
      }
    }

    /* Beehive - Hexi-Flexi Grid */
    .beehive-overlay {
      display: none;
      margin-bottom: 28px;
    }

    .beehive-overlay.open {
      display: block;
      animation: bhIn .35s ease;
    }

    @keyframes bhIn {
      from {
        opacity: 0;
        transform: translateY(-12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .beehive-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .beehive-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .beehive-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .beehive-header-left span {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .beehive-close {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--bg-card-alt);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--text-muted);
      transition: all .2s;
    }

    .beehive-close:hover {
      background: var(--critical-bg);
      color: var(--critical);
      border-color: var(--critical-border);
    }

    .hex-flexi {
      --s: 100px;
      --g: 10px;
      display: flex;
      gap: var(--g);
      flex-wrap: wrap;
      padding-bottom: calc(var(--s)/(4*cos(30deg)));
      margin: 0 auto;
    }

    .hf-cell {
      width: var(--s);
      aspect-ratio: cos(30deg);
      border-radius: 50%/25%;
      corner-shape: bevel;
      margin-bottom: calc(var(--s)/(-4*cos(30deg)));
      border: 8px solid;
      box-sizing: border-box;
      display: grid;
      place-content: center;
      cursor: pointer;
      position: relative;
      transition: transform .2s cubic-bezier(.4, 0, .2, 1);
      z-index: 1;
      overflow: visible;
      font-size: .6rem;
      font-weight: 700;
      color: var(--text-primary);
      text-shadow: none;
    }

    .hf-cell:hover {
      transform: scale(1.15);
      z-index: 3;
    }

    .hf-cell.healthy {
      background: var(--bg-card);
      border-color: var(--safe);
    }

    .hf-cell.warning {
      background: var(--bg-card);
      border-color: var(--warning);
    }

    .hf-cell.critical {
      background: var(--bg-card);
      border-color: var(--critical);
    }

    .hex-tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, .95);
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: .66rem;
      font-weight: 500;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
      z-index: 10;
      backdrop-filter: blur(10px);
      line-height: 1.5;
      text-shadow: none;
    }

    .hex-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(15, 23, 42, .95);
    }

    .hf-cell:hover .hex-tooltip {
      opacity: 1;
    }

    .hex-tooltip .tt-name {
      font-weight: 700;
      font-size: .72rem;
      margin-bottom: 2px;
    }

    .hex-tooltip .tt-host {
      opacity: .55;
      font-size: .6rem;
      margin-bottom: 4px;
    }

    .hex-tooltip .tt-alert {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 1px 0;
    }

    .hex-tooltip .tt-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .hex-tooltip .tt-dot.c {
      background: #fb7185;
    }

    .hex-tooltip .tt-dot.w {
      background: #fbbf24;
    }

    .hex-tooltip .tt-dot.h {
      background: #10b981;
    }

    .beehive-legend {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .beehive-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .7rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .beehive-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
    }

    .beehive-legend-dot.l-critical {
      background: linear-gradient(135deg, #fb7185, #e11d48);
    }

    .beehive-legend-dot.l-warning {
      background: linear-gradient(135deg, #fbbf24, #d97706);
    }

    .beehive-legend-dot.l-healthy {
      background: linear-gradient(135deg, #10b981, #059669);
    }

    .beehive-count {
      font-size: .82rem;
      font-weight: 800;
      margin-left: auto;
    }

    .beehive-count .bc-alert {
      color: var(--critical);
    }

    .beehive-count .bc-sep {
      color: var(--text-muted);
      margin: 0 1px;
    }

    .beehive-count .bc-total {
      color: var(--text-secondary);
    }

    .stat-card.total {
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .stat-card.total::after {
      content: 'Click to explore';
      position: absolute;
      bottom: 8px;
      right: 12px;
      font-size: .6rem;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity .2s;
    }

    .stat-card.total:hover::after {
      opacity: 1;
    }

    .stat-card.total:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), var(--shadow-lg);
    }

    .stat-card.critical {
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .stat-card.critical::after {
      content: 'Click for chart';
      position: absolute;
      bottom: 8px;
      right: 12px;
      font-size: .6rem;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity .2s;
    }

    .stat-card.critical:hover::after {
      opacity: 1;
    }

    .stat-card.critical:hover {
      border-color: var(--critical);
      box-shadow: 0 0 0 1px var(--critical), var(--shadow-lg);
    }

    .summary-chart-overlay {
      display: none;
      margin-bottom: 28px;
    }

    .summary-chart-overlay.open {
      display: block;
      animation: bhIn .35s ease;
    }

    .summary-chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .summary-chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .summary-chart-header span {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .summary-chart-box {
      height: 260px;
      max-width: 600px;
      margin: 0 auto;
    }

    .groups-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    .btn-expand {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: .72rem;
      font-weight: 600;
      color: var(--text-secondary);
      transition: all .2s;
    }

    .btn-expand:hover {
      background: var(--bg-hover);
      border-color: var(--border-hover);
      color: var(--text-primary);
    }
  </style>
